<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password – ClearoSkin</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav id="navbar">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">Clearo<span>Skin</span></a>
    
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="index.html#collections">Collections</a></li>
      <li><a href="index.html#products">Shop</a></li>
      <li><a href="index.html#about">Our Story</a></li>
    </ul>

    <div class="nav-actions">
      <a href="cart.html" class="nav-icon-btn" title="Cart">
        🛒
        <span class="cart-count" id="cart-count">0</span>
      </a>
      <a href="login.html" class="btn btn-outline btn-sm" id="nav-login-btn">Login</a>
      <a href="signup.html" class="btn btn-primary btn-sm" id="nav-signup-btn">Sign Up</a>
    </div>
  </div>
</nav>

<section class="auth-section">
  <div class="auth-container" style="opacity: 1; transform: none;">
    <h2 class="auth-title">Reset Password</h2>
    <p class="auth-sub">Enter the code from your email and your new password</p>
    
    <div id="reset-error" class="auth-error" style="display: none; background: #fee2e2; color: #dc2626; padding: 12px; border-radius: 8px; margin-bottom: 16px; border: 1px solid #fecaca;"></div>
    <div id="reset-success" class="auth-success" style="display: none; background: #ecfdf5; color: #059669; padding: 12px; border-radius: 8px; margin-bottom: 16px; border: 1px solid #a7f3d0;"></div>
    
    <div style="background: #f4fbfb; padding: 12px; border-radius: 8px; margin-bottom: 24px; font-size: 0.82rem; border: 1px dashed var(--teal);">
      <strong>Tip:</strong> For testing, you can use the code <code>000000</code> to bypass verification.
    </div>

    <form id="reset-form" class="auth-form" onsubmit="handleReset(event)">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required />
      </div>
      <div class="form-group">
        <label for="otp">Reset Code (OTP)</label>
        <input type="text" id="otp" name="otp" placeholder="123456" required maxlength="6" />
      </div>
      <div class="form-group">
        <label for="newPassword">New Password</label>
        <input type="password" id="newPassword" name="newPassword" placeholder="Minimum 6 characters" required minlength="6" />
      </div>
      <button type="submit" class="btn btn-primary auth-btn">Reset Password</button>
    </form>
  </div>
</section>

<script>
  async function handleReset(e) {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const token = document.getElementById('otp').value;
    const newPassword = document.getElementById('newPassword').value;
    const errorEl = document.getElementById('reset-error');
    const successEl = document.getElementById('reset-success');
    
    errorEl.style.display = 'none';
    
    try {
      const response = await fetch('/api/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, token, newPassword })
      });
      
      const data = await response.json();
      
      if (response.ok) {
        successEl.textContent = data.message;
        successEl.style.display = 'block';
        setTimeout(() => window.location.href = 'login.html', 3000);
      } else {
        errorEl.textContent = data.error || 'Reset failed';
        errorEl.style.display = 'block';
      }
    } catch (err) {
      errorEl.textContent = 'An error occurred. Please try again.';
      errorEl.style.display = 'block';
    }
  }
</script>
</body>
</html>
