<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify Email – ClearoSkin</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav id="navbar">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">Clearo<span>Skin</span></a>
  </div>
</nav>

<section class="auth-section">
  <div class="auth-container reveal">
    <h2 class="auth-title">Verify Your Email</h2>
    <p class="auth-sub" id="verify-sub">Enter the 6-digit code sent to your email</p>
    
    <div id="verify-error" class="auth-error" style="display: none;"></div>
    <div id="verify-success" class="auth-success" style="display: none;"></div>
    
    <form id="verify-form" class="auth-form" onsubmit="handleVerify(event)">
      <div class="form-group">
        <label for="otp">One-Time Password (OTP)</label>
        <input type="text" id="otp" name="otp" placeholder="123456" required maxlength="6" pattern="\d{6}" style="text-align:center; font-size: 1.5rem; letter-spacing: 8px;" />
      </div>
      <button type="submit" class="btn btn-primary auth-btn">Verify Account</button>
    </form>
    
    <div class="auth-footer">
      <p>Didn't receive the code? <a href="#" onclick="resendCode()">Resend</a></p>
    </div>
  </div>
</section>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const email = urlParams.get('email');
  if (email) {
    document.getElementById('verify-sub').textContent = `Enter the 6-digit code sent to ${email}`;
  }

  async function handleVerify(e) {
    e.preventDefault();
    const otp = document.getElementById('otp').value;
    const errorEl = document.getElementById('verify-error');
    const successEl = document.getElementById('verify-success');
    
    errorEl.style.display = 'none';
    
    try {
      const response = await fetch('/api/verify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, token: otp })
      });
      
      const data = await response.json();
      
      if (response.ok) {
        localStorage.setItem('clearo_token', data.token);
        localStorage.setItem('clearo_user', JSON.stringify(data.user));
        successEl.textContent = 'Email verified! Redirecting to home...';
        successEl.style.display = 'block';
        setTimeout(() => window.location.href = 'index.html', 2000);
      } else {
        errorEl.textContent = data.error || 'Verification failed';
        errorEl.style.display = 'block';
      }
    } catch (err) {
      errorEl.textContent = 'An error occurred. Please try again.';
      errorEl.style.display = 'block';
    }
  }

  function resendCode() {
    alert('A new code has been simulated. Check your "email".');
  }
</script>
</body>
</html>
